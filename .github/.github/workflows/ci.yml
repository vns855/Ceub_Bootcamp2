name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar o lint
        run: ruff check .

      - name: Rodar os teste
        run: pytest